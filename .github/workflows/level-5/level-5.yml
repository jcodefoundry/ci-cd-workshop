#############################################
# Level 5 — Bowser's Castle (STUB)
#
# Doel (verhaal):
#  Bestorm Bowser’s kasteel met een Dockerized applicatie.
#
# Daadwerkelijk leerdoel:
# - Een container image bouwen (zonder Dockerfile via Spring Boot buildpacks)
# - Conditioneel pushen naar een container registry (alleen vanaf main)
#
# Opmerking:
# - We gebruiken Spring Boot's `bootBuildImage` (Paketo buildpacks).
# - Voor GHCR push heb je `packages: write` permissie nodig.
#############################################
name: Level 5 - Bowser's Castle

on:
  workflow_dispatch: {}
  # TODO: overweeg push/pull_request triggers

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Login to GHCR (alleen op main)
        # TODO: maak dit conditioneel: alleen pushen vanaf main
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image (Paketo)
        # TODO: kies een image naam; tip: ghcr.io/<owner>/<repo>:<tag>
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          ./gradlew bootBuildImage --imageName ${IMAGE}

      - name: Push image (alleen op main)
        if: github.ref == 'refs/heads/main'
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          docker push ${IMAGE}
