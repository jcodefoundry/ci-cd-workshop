#############################################
# Level 6 — Rainbow Road (STUB)
#
# Doel (verhaal):
#  Scheur over Rainbow Road door je pipeline te optimaliseren.
#
# Daadwerkelijk leerdoel:
# - Caching toepassen voor snellere builds (Gradle wrapper + caches)
# - (Optioneel) Concurrency instellen om dubbele runs te annuleren
#############################################
name: Level 6 - Rainbow Road

on:
  workflow_dispatch: {}

# TODO (optioneel): voeg concurrency toe om runs te cancelen
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  speed-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle wrapper
        # TODO: configureer actions/cache met een goede key en paths
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-REPLACE_ME
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle caches
        # TODO: voeg ook ~/.gradle/caches en evt. ~/.gradle/notifications toe
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/notifications
          key: ${{ runner.os }}-gradle-caches-REPLACE_ME
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (voel de snelheid!)
        run: ./gradlew build --scan --no-daemon
