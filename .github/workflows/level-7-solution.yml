#############################################
# Level 7 — Star Road (SOLUTION)
#
# Refactor van monoliet naar leesbare delen:
# - Meerdere jobs met duidelijke verantwoordelijkheden
# - Gedeelde setup via composite action .github/actions/setup-java-gradle
# - Correcte permissies en conditionele push naar GHCR
# - Caching en (optioneel) concurrency
#############################################
name: Level 7 - Star Road (Solution)

on:
  workflow_dispatch: {}
  # Voor productiegebruik kun je push/pull_request triggers toevoegen.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  LATEST: ghcr.io/${{ github.repository }}:latest
  JACOCO_XML: build/reports/jacoco/test/jacocoTestReport.xml
  THRESHOLD: "0.80" # 80%

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup (JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build
        run: ./gradlew build --scan --no-daemon

      - name: Test
        run: ./gradlew test --stacktrace --no-daemon

      - name: Upload test reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test

  quality-gate:
    name: Quality Gate (JaCoCo)
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - name: Setup (checkout + JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Generate JaCoCo XML/HTML
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Enforce coverage threshold
        env:
          THRESHOLD: ${{ env.THRESHOLD }}
          REPORT_FILE: ${{ env.JACOCO_XML }}
        run: |
          set -euo pipefail
          if [ ! -f "$REPORT_FILE" ]; then
            echo "[ERROR] JaCoCo XML report niet gevonden op $REPORT_FILE"
            echo "Heb je de JaCoCo plugin en XML report geconfigureerd in Gradle? Zie level-3-README.md."
            exit 1
          fi
          line=$(grep -o '<counter type="LINE"[^>]*/>' "$REPORT_FILE" | tail -n1)
          if [ -z "$line" ]; then
            echo "[ERROR] Geen LINE coverage counter gevonden in $REPORT_FILE"
            exit 1
          fi
          missed=$(echo "$line" | sed -E 's/.*missed="([0-9]+)".*/\1/')
          covered=$(echo "$line" | sed -E 's/.*covered="([0-9]+)".*/\1/')
          total=$((missed + covered))
          echo "Missed=$missed Covered=$covered Total=$total"
          awk -v c="$covered" -v t="$total" -v thr="$THRESHOLD" 'BEGIN { \
            if (t==0) { print "[ERROR] Geen lijnen gemeten"; exit 1 } \
            cov=c/t; printf("Line coverage=%.2f%% (threshold %.0f%%)\n", cov*100, thr*100); \
            if (cov >= thr) exit 0; else exit 1 }'

      - name: Upload coverage reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html

  artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - name: Setup (checkout + JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build JAR (zonder tests)
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  image:
    name: Build & Push Image (alleen main)
    runs-on: ubuntu-latest
    needs: [artifact]
    steps:
      - name: Setup (checkout + JDK + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Login to GHCR (alleen op main)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image (Paketo)
        run: ./gradlew bootBuildImage --imageName ${IMAGE}

      - name: Push image (alleen op main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE}
          docker tag ${IMAGE} ${LATEST}
          docker push ${LATEST}
