#############################################
# Level 3 — Boo's Haunted Mansion (SOLUTION)
#
# Vereist: voeg de JaCoCo plugin toe in build.gradle en enable XML report.
# Voorbeeld in level-3-README.md.
#############################################
name: Level 3 - Boo's Haunted Mansion (Solution)

on:
  workflow_dispatch: {}

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests + JaCoCo
        run: ./gradlew test jacocoTestReport

      - name: Enforce coverage threshold
        env:
          THRESHOLD: "0.80" # 80%
          REPORT_FILE: build/reports/jacoco/test/jacocoTestReport.xml
        run: |
          set -euo pipefail
          if [ ! -f "$REPORT_FILE" ]; then
            echo "[ERROR] JaCoCo XML report niet gevonden op $REPORT_FILE"
            echo "Heb je de JaCoCo plugin en XML report geconfigureerd? Zie level-3-README.md."
            exit 1
          fi
          line=$(grep -o '<counter type="LINE"[^>]*/>' "$REPORT_FILE" | tail -n1)
          if [ -z "$line" ]; then
            echo "[ERROR] Geen LINE coverage counter gevonden in $REPORT_FILE"
            exit 1
          fi
          missed=$(echo "$line" | sed -E 's/.*missed="([0-9]+)".*/\1/')
          covered=$(echo "$line" | sed -E 's/.*covered="([0-9]+)".*/\1/')
          total=$((missed + covered))
          echo "Missed=$missed Covered=$covered Total=$total"
          awk -v c="$covered" -v t="$total" -v thr="$THRESHOLD" 'BEGIN { \
            if (t==0) { print "[ERROR] Geen lijnen gemeten"; exit 1 } \
            cov=c/t; printf("Line coverage=%.2f%% (threshold %.0f%%)\n", cov*100, thr*100); \
            if (cov >= thr) exit 0; else exit 1 }'

      - name: Upload coverage reports (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html
