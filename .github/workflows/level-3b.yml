#############################################
# Level 3b — Boo's Haunted Mansion
#
# Doel (verhaal):
#  Ontsnap aan Boo's spookhuis met de kracht van Quality Gates.
#
# Daadwerkelijk leerdoel:
# - Coverage meten met JaCoCo
# - Een minimale coverage‑drempel afdwingen (quality gate)
#
# Let op:
# - Voeg eerst de JaCoCo plugin toe in build.gradle (zie level-3-README.md)
#############################################
name: Level 3b - Boo's Haunted Mansion

on:
  workflow_dispatch: {}

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

        # TODO - kopieer werk van 3a, maar verander je minimum coverage naar 80% en zorg dat de test alsnog slaagt

      - name: Run tests + generate JaCoCo report
        env:
          JACOCO_MINIMUM_COVERAGE: "0.80"
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html
